name: Sync Sales Data

on:
  schedule:
    - cron: '*/5 * * * *'   # מנסה כל 5 דק' — וגם מפעיל מחדש את הלולאה כשהיא נגמרת
  workflow_dispatch:         # כפתור הפעלה ידנית

permissions:
  contents: write

# רק הרצה אחת פעילה בכל רגע; הרצה חדשה ממתינה בתור עד שהנוכחית נגמרת → כיסוי רציף
concurrency:
  group: sync-loop
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    env:
      TZ: Asia/Jerusalem

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pymssql

      - name: Sync loop (every 5 min for ~5h40m, then re-triggered)
        env:
          DB_SERVER:    ${{ secrets.DB_SERVER }}
          DB_NAME:      ${{ secrets.DB_NAME }}
          DB_USER:      ${{ secrets.DB_USER }}
          DB_PASSWORD:  ${{ secrets.DB_PASSWORD }}
          DB2_SERVER:   ${{ secrets.DB2_SERVER }}
          DB2_NAME:     ${{ secrets.DB2_NAME }}
          DB2_USER:     ${{ secrets.DB2_USER }}
          DB2_PASSWORD: ${{ secrets.DB2_PASSWORD }}
          DB2_LABEL:    ${{ secrets.DB2_LABEL }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          END=$((SECONDS + 20400))   # ~5 שעות 40 דקות
          while [ $SECONDS -lt $END ]; do
            python sync.py || echo "sync.py error — ממשיך"
            python sync_today.py || echo "sync_today.py error — ממשיך"
            git add docs/today.json docs/data.json docs/search.json docs/reports.json docs/users.json docs/sales.json
            if git diff --staged --quiet; then
              echo "אין שינויים"
            else
              git commit -m "Auto-sync $(date +'%d/%m/%Y %H:%M')"
              for i in 1 2 3 4 5; do
                git pull --rebase -X theirs origin master && git push && break
                echo "ניסיון push $i נכשל — מנסה שוב..."
                sleep 3
              done
            fi
            sleep 300   # 5 דקות
          done
          echo "הלולאה הסתיימה — GitHub יפעיל הרצה חדשה מהתור/התזמון"
